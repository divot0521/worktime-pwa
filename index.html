<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1976d2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Arbeitszeit">
  <title>Arbeitszeit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ View: Tag -->
  <div id="view-day" class="view">
    <header class="view-header">
      <button id="btn-prev-day" aria-label="Vorheriger Tag">&#8249;</button>
      <h1 id="day-title"></h1>
      <button id="btn-next-day" aria-label="Nächster Tag">&#8250;</button>
    </header>
    <main>
      <div class="form-group">
        <label for="input-hours">Stunden</label>
        <input type="number" id="input-hours" min="0" max="24" step="0.25"
               inputmode="decimal" placeholder="0">
      </div>
      <div class="form-group">
        <label for="input-note">Notiz</label>
        <input type="text" id="input-note" maxlength="100" placeholder="Optional">
      </div>
      <button id="btn-save">Speichern</button>
    </main>
  </div>

  <!-- ════════════════════════════════════════════════════ View: Monat -->
  <div id="view-month" class="view hidden">
    <header class="view-header">
      <button id="btn-prev-month" aria-label="Vorheriger Monat">&#8249;</button>
      <h1 id="month-title"></h1>
      <button id="btn-next-month" aria-label="Nächster Monat">&#8250;</button>
    </header>
    <main>
      <div id="month-container"></div>
    </main>
  </div>

  <!-- ═════════════════════════════════════════════════════ View: Jahr -->
  <div id="view-year" class="view hidden">
    <header class="view-header">
      <button id="btn-prev-year" aria-label="Vorheriges Jahr">&#8249;</button>
      <h1 id="year-title"></h1>
      <button id="btn-next-year" aria-label="Nächstes Jahr">&#8250;</button>
    </header>
    <main>
      <div id="year-container"></div>
    </main>
  </div>

  <!-- ══════════════════════════════════════════ View: Einstellungen -->
  <div id="view-settings" class="view hidden">
    <header class="view-header">
      <h1>Einstellungen</h1>
    </header>
    <main>
      <div class="form-group">
        <label for="input-default-hours">Standard-Stunden pro Tag</label>
        <input type="number" id="input-default-hours" min="0" max="24" step="0.25"
               inputmode="decimal">
      </div>
      <button id="btn-save-settings">Speichern</button>
    </main>
  </div>

  <!-- ════════════════════════════════════════════════════ Tab-Navigation -->
  <nav class="tab-bar" role="navigation" aria-label="Hauptnavigation">
    <button class="tab" data-view="day"      aria-label="Tag">Tag</button>
    <button class="tab" data-view="month"    aria-label="Monat">Monat</button>
    <button class="tab" data-view="year"     aria-label="Jahr">Jahr</button>
    <button class="tab" data-view="settings" aria-label="Einstellungen">&#9881;</button>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
